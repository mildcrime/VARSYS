; ============================================================================
;  VARSYS — модульная прошивка для LILYGO T-Embed CC1101 Plus S3 (ESP32-S3)
;  Этап 1: ядро (Core) + визуальный интерфейс (UI)
; ============================================================================

[platformio]
default_envs = t-embed-cc1101
src_dir = src
include_dir = include

; ----------------------------------------------------------------------------
;  Общие настройки для всех окружений
; ----------------------------------------------------------------------------
[env]
platform = espressif32@^6.7.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, colorize
build_type = debug

; Общие флаги сборки
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DVARSYS_VERSION=\"0.1.0\"
    -std=gnu++17
build_unflags =
    -std=gnu++11

; Внешние библиотеки (графика + GUI)
; Дисплей на TFT_eSPI (Arduino SPI) — как в Bruce: один SPIClass делится с CC1101.
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.3.11
    adafruit/Adafruit PN532@^1.3.4
    h2zero/NimBLE-Arduino@^1.4.2
    fastled/FastLED@^3.10.3
    mikalhart/TinyGPSPlus
    nrf24/RF24@1.4.11
    paulstoffregen/OneWire@^2.3.8
    adafruit/Adafruit Si4713 Library@1.2.3

; ----------------------------------------------------------------------------
;  Целевая плата: T-Embed CC1101 Plus S3
; ----------------------------------------------------------------------------
[env:t-embed-cc1101]
board = lilygo-t-embed-cc1101
board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

build_flags =
    ${env.build_flags}
    ; --- ESP32-S3 / память ---
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; --- LVGL: путь к пользовательскому конфигу ---
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I include
    ; --- TFT_eSPI: конфигурация панели ST7789 T-Embed CC1101 (как в Bruce) ---
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_MOSI=9
    -DTFT_MISO=10
    -DTFT_SCLK=11
    -DTFT_CS=41
    -DTFT_DC=16
    -DTFT_RST=40
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=1
    -DTFT_INVERSION_ON=1
    -DLOAD_GLCD=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DUSE_HSPI_PORT=1
